services:
  mongo:
    image: mongo:7
    container_name: cinema-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: cinema-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/cinema_booking
      - JWT_SECRET=ganti_dengan_rahasia_yang_kuat
      - CORS_ORIGIN=http://localhost
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - mongo

  frontend:
    build: ./frontend/fe-cinemabooking
    container_name: cinema-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
